services:
  - type: web
    name: zyra-app
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Base de datos ──────────────────────────────────
      - key: MONGODB_URI
        sync: false                # mongodb+srv://usuario:pass@cluster.mongodb.net/zyra

      # ── Autenticación ──────────────────────────────────
      - key: JWT_SECRET
        sync: false                # clave larga aleatoria, ej: openssl rand -hex 32
      - key: JWT_EXPIRE
        value: 7d

      # ── URLs (cambiar por tu dominio Render) ──────────
      - key: APP_URL
        sync: false                # https://zyra-app.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false                # https://zyra-app.onrender.com

      # ── IA (Groq) ──────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false                # gsk_...

      # ── Email (OTP / verificación) ─────────────────────
      - key: EMAIL_USER
        sync: false                # tu@gmail.com
      - key: EMAIL_PASS
        sync: false                # contraseña de aplicación de Gmail

      # ── Admin ──────────────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false                # tu@gmail.com (el que usas para entrar al panel admin)

      # ── Push Notifications (VAPID) ─────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        value: mailto:soporte@zyra.app

      # ── Pagos Stripe ───────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false                # sk_live_... (o sk_test_... para pruebas)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false                # whsec_...
      - key: STRIPE_PRICE_BASIC_M
        sync: false                # price_... (Plan Básico mensual)
      - key: STRIPE_PRICE_BASIC_Y
        sync: false                # price_... (Plan Básico anual)
      - key: STRIPE_PRICE_PREMIUM_M
        sync: false                # price_... (Plan Premium mensual)
      - key: STRIPE_PRICE_PREMIUM_Y
        sync: false                # price_... (Plan Premium anual)

      # ── YouTube API ────────────────────────────────────
      - key: YT_API_KEY
        sync: false                # AIza...

      # ── D-ID video avatar (opcional) ──────────────────
      - key: DID_API_KEY
        sync: false
